## ============================================================================
##  Configuración usada SÓLO en los tests (perfil "test").
##
##  Levanta una base de datos H2 en memoria en modo de compatibilidad con
##  PostgreSQL, de modo que los tests de integración puedan arrancar el
##  contexto de Spring sin necesitar un PostgreSQL real ni Docker.
## ============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:todo_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ## En tests dejamos que Hibernate cree el esquema (no usamos Flyway).
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  ## Flyway desactivado en tests: las migraciones son SQL específico de
  ## PostgreSQL; en H2 el esquema lo genera Hibernate.
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-1234567890
    expiration-ms: 3600000
