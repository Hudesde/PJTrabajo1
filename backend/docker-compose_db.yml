services:
  db:
    image: postgres:17-alpine
    container_name: postgres_17_db
    restart: unless-stopped
    ports:
      # Bind to 127.0.0.1 for security to prevent exposing the database port to the network.
      # Map host port 5433 to container port 5432.
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./dump-cotran_prueba-202605221039-sicac:/tmp/dump_dir
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
    driver: local
